<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna — 婦科健康實驗平台</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff0f5;
            --surface: #fff5f8;
            --surface2: #ffe8f0;
            --border: #f4c6d8;
            --accent: #d63384;
            --accent-soft: #e8779a;
            --accent-light: #ffe0ec;
            --pink-deep: #c2185b;
            --pink-pale: #fce4ec;
            --pink-mid: #f48fb1;
            --text: #2d1b26;
            --text-mid: #6b3a52;
            --text-muted: #b07090;
            --luna-bubble: #fff0f6;
            --user-bubble: #ffffff;
            --radius: 18px;
            --shadow: 0 4px 20px rgba(180,60,100,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- 左側面板 --- */
        #left-panel {
            width: 380px;
            background: var(--surface);
            border-right: 1.5px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, width 0.3s ease;
            z-index: 50;
        }
        #left-panel.collapsed { width: 0; transform: translateX(-100%); overflow: hidden; }

        .panel-header {
            padding: 24px;
            background: linear-gradient(135deg, #ffe4ef 0%, #ffd6e7 100%);
            border-bottom: 1px solid var(--border);
        }
        .eyebrow { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
        .panel-header h2 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); }

        .api-section { padding: 16px 24px; border-bottom: 1px solid var(--border); background: #fffafc; }
        .api-row { display: flex; gap: 8px; margin-top: 8px; }
        .api-input-wrap { flex: 1; position: relative; }
        .api-input-wrap input {
            width: 100%; padding: 10px 12px; border-radius: 10px; border: 1.5px solid var(--border);
            font-family: monospace; font-size: 12px; outline: none;
        }
        .btn-save { background: var(--accent); color: white; border: none; padding: 0 16px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 12px; }

        .panel-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        #knowledge-input {
            width: 100%; height: 120px; padding: 12px; border-radius: 12px; border: 1.5px solid var(--border);
            font-size: 13px; resize: none; outline: none; background: white;
        }
        .batch-name-input { width: 100%; padding: 10px; border-radius: 10px; border: 1.5px solid var(--border); font-size: 13px; margin-bottom: 8px; }

        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        .log-item { background: white; border: 1px solid var(--border); padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; }
        .log-delete { color: var(--text-muted); cursor: pointer; font-size: 18px; border: none; background: none; }

        /* --- 右側面板 --- */
        #right-panel { flex: 1; display: flex; flex-direction: column; position: relative; background: white; }
        
        #toggle-btn {
            position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            background: var(--accent); color: white; border: none; padding: 15px 5px;
            border-radius: 0 10px 10px 0; cursor: pointer; z-index: 100;
        }

        #chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: white; }
        .luna-avatar { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
        
        .tab-bar { display: flex; border-bottom: 1px solid var(--border); padding: 0 24px; background: #fafafa; }
        .tab-btn { padding: 12px 20px; border: none; background: none; cursor: pointer; color: var(--text-muted); font-weight: 500; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; background: #fffcfd; }
        .message { max-width: 85%; display: flex; flex-direction: column; gap: 6px; }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.bot { align-self: flex-start; }
        .bubble { padding: 14px 18px; border-radius: 20px; font-size: 14px; line-height: 1.6; position: relative; }
        .user .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .bot .bubble { background: var(--luna-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: var(--text); }

        .lang-divider { border-top: 1px solid rgba(214,51,132,0.15); margin: 10px 0; padding-top: 10px; font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; }

        #input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 12px; background: white; }
        #user-input { flex: 1; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px; outline: none; resize: none; max-height: 150px; }
        #send-btn { background: var(--accent); color: white; border: none; width: 48px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* --- 實驗記錄面板 --- */
        #exp-panel { flex: 1; display: none; padding: 30px; overflow-y: auto; }
        #exp-panel.active { display: block; }
        .exp-card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
        .exp-tag { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 10px; }
        .tag-db { background: #e8f5e9; color: #2e7d32; }
        .tag-nodb { background: #fff3e0; color: #e65100; }
        
        .typing { display: flex; gap: 4px; padding: 10px; }
        .dot { width: 6px; height: 6px; background: var(--accent-soft); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="left-panel">
    <div class="panel-header">
        <div class="eyebrow">Data Management</div>
        <h2>Luna 知識庫訓練</h2>
    </div>

    <div class="api-section">
        <div class="eyebrow">Gemini API Key</div>
        <div class="api-row">
            <div class="api-input-wrap">
                <input type="password" id="api-key-input" placeholder="AIzaSy...">
            </div>
            <button class="btn-save" onclick="saveApiKey()">儲存</button>
        </div>
        <div id="api-status" style="font-size: 11px; margin-top: 8px; color: var(--text-muted);">尚未設定 Key</div>
    </div>

    <div class="panel-body">
        <input type="text" id="batch-name" class="batch-name-input" placeholder="批次名稱（如：月經衛教資料）">
        <textarea id="knowledge-input" placeholder="在此貼上醫療知識內容..."></textarea>
        <button class="btn-primary" onclick="addBatch()">＋ 加入資料庫</button>

        <div class="eyebrow" style="margin-top: 10px;">已載入資料 ( <span id="db-count">0</span> )</div>
        <div id="training-log"></div>
        <button class="btn-primary" style="background: #333; margin-top: auto;" onclick="clearBatches()">清除所有資料</button>
    </div>
</div>

<div id="right-panel">
    <button id="toggle-btn" onclick="togglePanel()">◀</button>
    
    <div id="chat-header">
        <div class="luna-avatar">🌙</div>
        <div>
            <h3 style="font-family: 'Playfair Display', serif;">Luna</h3>
            <div style="font-size: 12px; color: var(--text-muted);">雙語健康小夥伴 · 中文 / ID / EN</div>
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" id="tab-chat" onclick="switchTab('chat')">對話測試</button>
        <button class="tab-btn" id="tab-exp" onclick="switchTab('exp')">實驗記錄</button>
    </div>

    <!-- 聊天畫面 -->
    <div id="chat-container" style="display: flex; flex-direction: column; flex: 1;">
        <div id="messages"></div>
        <div id="input-area">
            <textarea id="user-input" rows="1" placeholder="問問 Luna..." onkeydown="handleEnter(event)"></textarea>
            <button id="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- 記錄畫面 -->
    <div id="exp-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h2 style="font-family: 'Playfair Display', serif;">實驗記錄對照</h2>
            <button class="btn-save" onclick="exportCSV()">匯出 CSV</button>
        </div>
        <div id="exp-list"></div>
    </div>
</div>

<script>
    // --- 核心變數 ---
    // 使用 gemini-1.5-flash 以確保最廣泛的相容性
    const modelName = "gemini-1.5-flash";
    let apiKey = localStorage.getItem('luna_api_key') || '';
    let batches = JSON.parse(localStorage.getItem('luna_batches') || '[]');
    let expLogs = JSON.parse(localStorage.getItem('luna_exp_logs') || '[]');

    // --- 初始化 ---
    window.onload = () => {
        if (apiKey) {
            document.getElementById('api-key-input').value = '********' + apiKey.slice(-4);
            document.getElementById('api-status').innerHTML = '✅ API Key 已就緒';
        }
        renderBatches();
        renderExpLogs();
        addBotMessage("Selamat datang! 🌙 你好，我是 Luna。你可以隨時問我關於婦科健康的問題。");
    };

    // --- UI 控制 ---
    function togglePanel() {
        const panel = document.getElementById('left-panel');
        const btn = document.getElementById('toggle-btn');
        panel.classList.toggle('collapsed');
        btn.innerHTML = panel.classList.contains('collapsed') ? '▶' : '◀';
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('chat-container').style.display = tab === 'chat' ? 'flex' : 'none';
        document.getElementById('exp-panel').style.display = tab === 'exp' ? 'block' : 'none';
        if (tab === 'exp') renderExpLogs();
    }

    // --- API 管理 ---
    function saveApiKey() {
        const val = document.getElementById('api-key-input').value.trim();
        if (val.startsWith('AIza')) {
            apiKey = val;
            localStorage.setItem('luna_api_key', val);
            alert('API Key 已儲存！');
            location.reload();
        } else {
            alert('請輸入正確的 Gemini API Key (以 AIza 開頭)');
        }
    }

    // --- 知識庫管理 ---
    function addBatch() {
        const nameInput = document.getElementById('batch-name');
        const contentInput = document.getElementById('knowledge-input');
        if (!contentInput.value.trim()) return;

        const newBatch = {
            id: Date.now(),
            name: nameInput.value || `批次 ${batches.length + 1}`,
            content: contentInput.value.trim()
        };
        batches.push(newBatch);
        localStorage.setItem('luna_batches', JSON.stringify(batches));
        nameInput.value = '';
        contentInput.value = '';
        renderBatches();
    }

    function renderBatches() {
        const list = document.getElementById('training-log');
        const count = document.getElementById('db-count');
        list.innerHTML = '';
        batches.forEach(b => {
            const div = document.createElement('div');
            div.className = 'log-item';
            div.innerHTML = `<span>${b.name} (${b.content.length}字)</span><button class="log-delete" onclick="deleteBatch(${b.id})">×</button>`;
            list.appendChild(div);
        });
        count.innerText = batches.length;
    }

    function deleteBatch(id) {
        batches = batches.filter(b => b.id !== id);
        localStorage.setItem('luna_batches', JSON.stringify(batches));
        renderBatches();
    }

    function clearBatches() {
        if (confirm('確定要清除所有訓練資料嗎？')) {
            batches = [];
            localStorage.removeItem('luna_batches');
            renderBatches();
        }
    }

    // --- 對話邏輯 ---
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text || !apiKey) {
            if (!apiKey) alert('請先設定 API Key');
            return;
        }

        addUserMessage(text);
        input.value = '';
        input.style.height = 'auto';

        const typingId = showTyping();

        // 構建 Prompt
        const knowledgeBase = batches.map(b => `[${b.name}]: ${b.content}`).join('\n\n');
        const systemPrompt = `
你是 Luna，一位溫柔且專業的婦科健康 AI 助手。
任務：
1. 根據「知識庫內容」回答問題。如果知識庫沒有相關內容，請回答「這個問題我目前的資料庫裡還沒有相關資訊，建議你諮詢專業醫師哦 🌸」。
2. 回答必須包含兩部分：繁體中文與印尼文 (Bahasa Indonesia)。
3. 使用分隔符 "|||" 分開兩種語言。
4. 在每個回答末尾加上醫療免責聲明。

知識庫內容：
${knowledgeBase || "目前無資料庫內容。"}
        `;

        try {
            // 使用 v1beta 介面，支援大多數現有的 Gemini 帳號
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [
                        {
                            role: "user",
                            parts: [{ text: systemPrompt + "\n\n使用者問題: " + text }]
                        }
                    ],
                    generationConfig: {
                        temperature: 0.7,
                        maxOutputTokens: 1000,
                    }
                })
            });

            const data = await response.json();
            removeTyping(typingId);

            if (data.error) {
                throw new Error(data.error.message || "API 調用發生錯誤");
            }

            if (data.candidates && data.candidates[0].content) {
                const fullText = data.candidates[0].content.parts[0].text;
                const parts = fullText.split('|||');
                const zh = parts[0] ? parts[0].trim() : "抱歉，我無法正常生成回答。";
                const id = parts[1] ? parts[1].trim() : "";
                addBotMessage(zh, id);
                saveLog(text, zh, batches.length > 0);
            } else {
                addBotMessage("發生未預期的錯誤，請檢查您的 API Key 額度或連線狀態。");
            }
        } catch (err) {
            removeTyping(typingId);
            addBotMessage("系統錯誤: " + err.message);
            console.error(err);
        }
    }

    function addUserMessage(text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message user';
        msgDiv.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
        document.getElementById('messages').appendChild(msgDiv);
        scrollToBottom();
    }

    function addBotMessage(zh, id = "") {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message bot';
        let content = `<div class="bubble"><div>${escapeHtml(zh).replace(/\n/g, '<br>')}</div>`;
        if (id) {
            content += `<div class="lang-divider">Bahasa Indonesia</div><div>${escapeHtml(id).replace(/\n/g, '<br>')}</div>`;
        }
        content += `</div>`;
        msgDiv.innerHTML = content;
        document.getElementById('messages').appendChild(msgDiv);
        scrollToBottom();
    }

    function showTyping() {
        const id = 't-' + Date.now();
        const div = document.createElement('div');
        div.id = id;
        div.className = 'message bot';
        div.innerHTML = `<div class="bubble"><div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>`;
        document.getElementById('messages').appendChild(div);
        scrollToBottom();
        return id;
    }

    function removeTyping(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    // --- 實驗記錄邏輯 ---
    function saveLog(q, a, hasDB) {
        const log = {
            id: Date.now(),
            time: new Date().toLocaleString(),
            question: q,
            answer: a,
            hasDB: hasDB,
            batchCount: batches.length
        };
        expLogs.unshift(log);
        localStorage.setItem('luna_exp_logs', JSON.stringify(expLogs));
    }

    function renderExpLogs() {
        const list = document.getElementById('exp-list');
        list.innerHTML = expLogs.length ? '' : '<p style="text-align:center; color:#999; padding: 20px;">尚無記錄</p>';
        expLogs.forEach(log => {
            const div = document.createElement('div');
            div.className = 'exp-card';
            div.innerHTML = `
                <span class="exp-tag ${log.hasDB ? 'tag-db' : 'tag-nodb'}">${log.hasDB ? '實驗組 (有資料庫)' : '對照組 (無資料庫)'}</span>
                <div style="font-size: 11px; color: #999; margin-bottom: 8px;">${log.time} | 載入批次: ${log.batchCount}</div>
                <p><strong>問：</strong> ${escapeHtml(log.question)}</p>
                <p style="margin-top:10px; color:#555; border-top: 1px dashed #eee; padding-top: 10px;"><strong>答：</strong> ${escapeHtml(log.answer).substring(0, 200)}...</p>
            `;
            list.appendChild(div);
        });
    }

    function exportCSV() {
        if (!expLogs.length) {
            alert('沒有資料可匯出');
            return;
        }
        let csvContent = "\uFEFF時間,組別,批次數,問題,回答\n";
        expLogs.forEach(log => {
            const group = log.hasDB ? "實驗組" : "對照組";
            const row = [log.time, group, log.batchCount, log.question, log.answer].map(s => `"${String(s).replace(/"/g, '""')}"`).join(",");
            csvContent += row + "\n";
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `Luna_Experiment_Log_${Date.now()}.csv`);
        link.click();
    }

    // --- 工具函式 ---
    function handleEnter(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
    function scrollToBottom() { const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }
    function escapeHtml(text) { 
        if (!text) return "";
        const p = document.createElement('p'); 
        p.textContent = text; 
        return p.innerHTML; 
    }
</script>
</body>
</html>
