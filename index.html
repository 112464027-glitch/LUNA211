<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Luna — 婦科健康知識助理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');

  :root {
    --bg: #fff0f5;
    --surface: #fff5f8;
    --surface2: #ffe8f0;
    --border: #f4c6d8;
    --accent: #d63384;
    --accent-soft: #e8779a;
    --accent-light: #ffe0ec;
    --pink-deep: #c2185b;
    --pink-pale: #fce4ec;
    --pink-mid: #f48fb1;
    --text: #2d1b26;
    --text-mid: #6b3a52;
    --text-muted: #b07090;
    --radius: 18px;
    --shadow: 0 4px 24px rgba(180,60,100,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  /* ── Card ── */
  .card {
    width: 100%;
    max-width: 720px;
    height: min(90vh, 820px);
    background: var(--surface);
    border-radius: 24px;
    box-shadow: var(--shadow);
    border: 1.5px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 16px 22px;
    background: linear-gradient(135deg, #ffe4ef 0%, #ffd6e7 100%);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 13px;
    flex-shrink: 0;
  }
  .header-avatar {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 3px 12px rgba(214,51,132,0.28);
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }
  .header-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .header-badge {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    color: var(--pink-deep);
    font-weight: 500;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #e91e8c;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: linear-gradient(180deg, #fff5f8 0%, #fff0f5 100%);
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    gap: 9px;
    max-width: 82%;
    animation: fadeUp 0.28s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.bot  { align-self: flex-start; }

  .msg-av {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 4px;
    font-size: 16px;
    overflow: hidden;
  }
  .message.bot .msg-av {
    box-shadow: 0 2px 8px rgba(214,51,132,0.25);
  }
  .message.user .msg-av {
    background: var(--pink-pale);
    border: 1px solid var(--border);
  }

  .bubble-wrap { display: flex; flex-direction: column; gap: 3px; }
  .sender { font-size: 10px; color: var(--text-muted); padding: 0 4px; }
  .msg-time { font-size: 9px; color: var(--text-muted); opacity: 0.7; margin-left: 4px; }
  .message.user .sender { text-align: right; }

  .bubble {
    padding: 11px 15px;
    font-size: 14px;
    line-height: 1.78;
    border-radius: var(--radius);
    box-shadow: 0 1px 6px rgba(180,60,100,0.07);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .message.bot .bubble {
    background: #fff0f6;
    border: 1px solid #f9c6da;
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .message.user .bubble {
    background: white;
    border: 1px solid var(--border);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  /* ── Typing indicator ── */
  .typing { display: flex; gap: 5px; padding: 4px 2px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-soft);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* ── Error message ── */
  .error-msg {
    align-self: center;
    font-size: 12px;
    color: #c62828;
    background: #fde8e8;
    border: 1px solid #ef9a9a;
    border-radius: 20px;
    padding: 6px 16px;
  }

  /* ── Input area ── */
  .input-area {
    padding: 13px 18px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 15px;
    resize: none;
    outline: none;
    max-height: 110px;
    line-height: 1.6;
    transition: border-color 0.2s;
  }
  #user-input:focus { border-color: var(--accent-soft); }
  #user-input::placeholder { color: var(--text-muted); }

  #send-btn {
    background: linear-gradient(135deg, var(--accent-soft), var(--accent));
    border: none;
    border-radius: 14px;
    width: 46px;
    height: 46px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 3px 12px rgba(214,51,132,0.3);
  }
  #send-btn:hover:not(:disabled) { opacity: 0.88; transform: scale(1.05); }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
  #send-btn svg { width: 20px; height: 20px; fill: white; }

  /* ── Bilingual blocks ── */
  .lang-block {
    border-radius: 12px;
    padding: 11px 13px;
    margin-bottom: 8px;
  }
  .lang-block:last-child { margin-bottom: 0; }
  .zh-block {
    background: #fff5f8;
    border: 1px solid #f9c6da;
  }
  .id-block {
    background: #fff8f0;
    border: 1px solid #ffd6a0;
  }
  .lang-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.75;
  }
  .zh-block .lang-tag { color: #c2185b; }
  .id-block .lang-tag { color: #e65100; }
  .lang-text {
    font-size: 13.5px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  /* Override bubble padding when bilingual */
  .message.bot .bubble {
    padding: 12px 13px;
  }
</style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="header-avatar">
      <!-- Luna SVG Avatar -->
      <svg width="46" height="46" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="22" r="22" fill="url(#hg)"/>
        <defs>
          <radialGradient id="hg" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#ffd6e8"/>
            <stop offset="100%" stop-color="#e8779a"/>
          </radialGradient>
        </defs>
        <ellipse cx="22" cy="18" rx="13" ry="14" fill="#4a2040"/>
        <ellipse cx="22" cy="24" rx="11" ry="12" fill="#fde8d0"/>
        <ellipse cx="22" cy="12" rx="13" ry="7" fill="#4a2040"/>
        <ellipse cx="10" cy="22" rx="3.5" ry="6" fill="#4a2040"/>
        <ellipse cx="34" cy="22" rx="3.5" ry="6" fill="#4a2040"/>
        <ellipse cx="17" cy="11" rx="3" ry="2" fill="#7a4060" opacity="0.5"/>
        <ellipse cx="11" cy="24" rx="2.2" ry="2.8" fill="#fcd5b0"/>
        <ellipse cx="33" cy="24" rx="2.2" ry="2.8" fill="#fcd5b0"/>
        <ellipse cx="18" cy="23" rx="2.5" ry="2.8" fill="white"/>
        <ellipse cx="26" cy="23" rx="2.5" ry="2.8" fill="white"/>
        <circle cx="18.6" cy="23.4" r="1.6" fill="#3d1a2e"/>
        <circle cx="26.6" cy="23.4" r="1.6" fill="#3d1a2e"/>
        <circle cx="19.2" cy="22.6" r="0.6" fill="white"/>
        <circle cx="27.2" cy="22.6" r="0.6" fill="white"/>
        <line x1="16" y1="20.8" x2="15.2" y2="19.8" stroke="#3d1a2e" stroke-width="0.7" stroke-linecap="round"/>
        <line x1="18" y1="20.3" x2="17.8" y2="19.2" stroke="#3d1a2e" stroke-width="0.7" stroke-linecap="round"/>
        <line x1="20" y1="20.8" x2="20.4" y2="19.8" stroke="#3d1a2e" stroke-width="0.7" stroke-linecap="round"/>
        <line x1="24" y1="20.8" x2="23.6" y2="19.8" stroke="#3d1a2e" stroke-width="0.7" stroke-linecap="round"/>
        <line x1="26" y1="20.3" x2="26.2" y2="19.2" stroke="#3d1a2e" stroke-width="0.7" stroke-linecap="round"/>
        <line x1="28" y1="20.8" x2="28.8" y2="19.8" stroke="#3d1a2e" stroke-width="0.7" stroke-linecap="round"/>
        <ellipse cx="14.5" cy="26.5" rx="3" ry="1.8" fill="#f48fb1" opacity="0.45"/>
        <ellipse cx="29.5" cy="26.5" rx="3" ry="1.8" fill="#f48fb1" opacity="0.45"/>
        <ellipse cx="22" cy="27" rx="1" ry="0.7" fill="#e8a090" opacity="0.6"/>
        <path d="M18.5 30 Q22 33 25.5 30" stroke="#d6637a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <circle cx="29" cy="13" r="3" fill="#ff6fa8" opacity="0.9"/>
        <circle cx="29" cy="13" r="1.5" fill="#ffd6e8"/>
        <circle cx="29" cy="13" r="0.7" fill="#ff6fa8"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Luna</div>
      <div class="header-sub">婦科健康知識助理 · 中文 & Bahasa Indonesia 🌸</div>
    </div>
    <div class="header-badge">
      <div class="dot"></div>
      <span>線上中</span>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages"></div>

  <!-- Input area -->
  <div class="input-area">
    <textarea id="user-input" rows="1"
      placeholder="詢問婦科健康問題 / Tanya masalah kesehatan wanita 🌸（Enter 送出）"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="送出">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────────
  let isLoading = false;
  let chatHistory = []; // [{ role: "user"|"model", text: "..." }]

  // ── Luna SVG (小版，用於訊息泡泡) ─────────────────────────────────────────────
  const LUNA_SVG = `<svg width="34" height="34" viewBox="0 0 44 44" fill="none">
    <circle cx="22" cy="22" r="22" fill="url(#mg)"/>
    <defs><radialGradient id="mg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffd6e8"/><stop offset="100%" stop-color="#e8779a"/>
    </radialGradient></defs>
    <ellipse cx="22" cy="18" rx="13" ry="14" fill="#4a2040"/>
    <ellipse cx="22" cy="24" rx="11" ry="12" fill="#fde8d0"/>
    <ellipse cx="22" cy="12" rx="13" ry="7" fill="#4a2040"/>
    <ellipse cx="10" cy="22" rx="3.5" ry="6" fill="#4a2040"/>
    <ellipse cx="34" cy="22" rx="3.5" ry="6" fill="#4a2040"/>
    <ellipse cx="11" cy="24" rx="2.2" ry="2.8" fill="#fcd5b0"/>
    <ellipse cx="33" cy="24" rx="2.2" ry="2.8" fill="#fcd5b0"/>
    <ellipse cx="18" cy="23" rx="2.5" ry="2.8" fill="white"/>
    <ellipse cx="26" cy="23" rx="2.5" ry="2.8" fill="white"/>
    <circle cx="18.6" cy="23.4" r="1.6" fill="#3d1a2e"/>
    <circle cx="26.6" cy="23.4" r="1.6" fill="#3d1a2e"/>
    <circle cx="19.2" cy="22.6" r="0.6" fill="white"/>
    <circle cx="27.2" cy="22.6" r="0.6" fill="white"/>
    <ellipse cx="14.5" cy="26.5" rx="3" ry="1.8" fill="#f48fb1" opacity="0.45"/>
    <ellipse cx="29.5" cy="26.5" rx="3" ry="1.8" fill="#f48fb1" opacity="0.45"/>
    <path d="M18.5 30 Q22 33 25.5 30" stroke="#d6637a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <circle cx="29" cy="13" r="3" fill="#ff6fa8" opacity="0.9"/>
    <circle cx="29" cy="13" r="1.5" fill="#ffd6e8"/>
  </svg>`;

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function getTime() {
    return new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
  }

  function escHtml(str) {
    return (str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  function scrollToBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 110) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── Render helpers ────────────────────────────────────────────────────────────

  // 將回答依 --- 分成中文段 / 印尼文段，分別渲染
  function renderBotContent(text) {
    const parts = text.split(/\n---\n|\n---$/);
    if (parts.length >= 2) {
      const zh  = parts[0].trim();
      const id  = parts.slice(1).join('\n---\n').trim();
      return `
        <div class="lang-block zh-block">
          <div class="lang-tag">🇹🇼 繁體中文</div>
          <div class="lang-text">${escHtml(zh)}</div>
        </div>
        <div class="lang-block id-block">
          <div class="lang-tag">🇮🇩 Bahasa Indonesia</div>
          <div class="lang-text">${escHtml(id)}</div>
        </div>`;
    }
    // fallback: 純文字
    return `<div class="lang-text">${escHtml(text)}</div>`;
  }

  function addMessage(role, text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + role;

    const isBot = role === 'bot';
    const contentHtml = isBot ? renderBotContent(text) : escHtml(text);

    div.innerHTML = `
      <div class="msg-av">${isBot ? LUNA_SVG : '👤'}</div>
      <div class="bubble-wrap">
        <div class="sender">${isBot ? 'Luna' : '你 / Kamu'}<span class="msg-time">${getTime()}</span></div>
        <div class="bubble">${contentHtml}</div>
      </div>`;

    msgs.appendChild(div);
    scrollToBottom();
    return div;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="msg-av">${LUNA_SVG}</div>
      <div class="bubble-wrap">
        <div class="sender">Luna</div>
        <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
      </div>`;
    msgs.appendChild(div);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function showError(msg) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'error-msg';
    div.textContent = '⚠️ ' + msg;
    msgs.appendChild(div);
    scrollToBottom();
  }

  // ── Send message ──────────────────────────────────────────────────────────────
  async function sendMessage() {
    if (isLoading) return;

    const input = document.getElementById('user-input');
    const prompt = input.value.trim();
    if (!prompt) return;

    // Reset input
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
    isLoading = true;

    // Show user message
    addMessage('user', prompt);
    chatHistory.push({ role: 'user', text: prompt });

    // Show typing
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt,
          history: chatHistory.slice(-20) // 最多帶 20 則歷史
        })
      });

      removeTyping();

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || '伺服器錯誤 (' + res.status + ')');
      }

      const data = await res.json();
      const reply = data.reply || '（無回應）';

      addMessage('bot', reply);
      chatHistory.push({ role: 'model', text: reply });

    } catch (err) {
      removeTyping();
      showError(err.message || '連線失敗，請稍後再試');
      // 移除失敗的 user history
      chatHistory.pop();
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  // ── 初始歡迎訊息（雙語） ──────────────────────────────────────────────────────
  (function init() {
    const welcome =
      '嗨！我是 Luna，你的婦科健康知識助理 🌸\n\n' +
      '我可以用 中文 及 印尼文（Bahasa Indonesia）解答你的婦科相關問題，例如：\n\n' +
      '• 月經不規律或痛經是什麼原因？\n' +
      '• 白帶異常代表什麼？\n' +
      '• 多囊性卵巢症候群（PCOS）是什麼？\n' +
      '• 子宮頸抹片檢查多久做一次？\n' +
      '• 更年期有哪些常見症狀？\n\n' +
      '你可以用中文、印尼文或英文提問，我都能理解並同時用兩種語言回答你 💬\n\n' +
      '⚠️ 免責聲明：本服務提供之內容僅供衛教參考，不構成醫療診斷。如有身體不適，請務必就醫。' +
      '\n---\n' +
      'Halo! Saya Luna, asisten kesehatan wanita Anda 🌸\n\n' +
      'Saya bisa menjawab pertanyaan seputar kesehatan ginekologi dalam Bahasa Mandarin dan Bahasa Indonesia, misalnya:\n\n' +
      '• Apa penyebab menstruasi tidak teratur atau nyeri haid?\n' +
      '• Apa arti keputihan yang tidak normal?\n' +
      '• Apa itu Sindrom Ovarium Polikistik (PCOS)?\n' +
      '• Seberapa sering harus melakukan Pap smear?\n' +
      '• Apa saja gejala umum menopause?\n\n' +
      'Anda bisa bertanya dalam Bahasa Mandarin, Indonesia, atau Inggris — saya akan memahami dan menjawab dalam dua bahasa 💬\n\n' +
      '⚠️ Penafian: Informasi ini hanya bersifat edukatif dan bukan pengganti saran medis profesional. Jika ada keluhan, segera konsultasikan ke dokter.';
    addMessage('bot', welcome);
  })();
</script>
</body>
</html>
